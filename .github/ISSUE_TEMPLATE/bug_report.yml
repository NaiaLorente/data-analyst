name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: AI provider + model
      description: e.g. "Anthropic, claude-sonnet-5" or "Ollama, llama3.1"
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the shape of the data if relevant (no need to share the actual file/data).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Error message / traceback
      render: shell
    validations:
      required: false
